<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-lg">
        
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-800">Churn Predictor</h2>
            <p class="text-gray-500 mt-2">Enter customer details to assess retention risk</p>
        </div>

        <form action="/predict" method="post" class="space-y-5">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tenure (Months)</label>
                    <input type="number" step="0.1" name="tenure" required placeholder="e.g. 12"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Monthly Charges ($)</label>
                    <input type="number" step="0.01" name="monthly" required placeholder="e.g. 65.50"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Total Charges ($)</label>
                <input type="number" step="0.01" name="total" required placeholder="e.g. 780.00"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contract Type</label>
                    <select name="contract" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white">
                        <option value="0">Month-to-month</option>
                        <option value="1">One year</option>
                        <option value="2">Two year</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Internet Service</label>
                    <select name="internet" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white">
                        <option value="0">DSL</option>
                        <option value="1">Fiber optic</option>
                        <option value="2">No</option>
                    </select>
                </div>
            </div>

            <button type="submit" 
                class="w-full mt-6 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-semibold py-3 rounded-lg shadow-md hover:from-blue-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-all">
                Analyze Customer Risk
            </button>
        </form>

        {% if prediction_text %}
        <div class="mt-8 p-5 rounded-lg border text-center {{ risk_class }}">
            <h3 class="text-xl font-bold mb-1">{{ risk }}</h3>
            <p class="text-sm font-medium">{{ prediction_text }}</p>
        </div>
        {% endif %}
        
        {% if error_text %}
        <div class="mt-8 p-5 rounded-lg border text-center text-red-700 bg-red-50 border-red-200">
            <h3 class="text-lg font-bold">Error</h3>
            <p class="text-sm">{{ error_text }}</p>
        </div>
        {% endif %}

    </div>

</body>
</html>
